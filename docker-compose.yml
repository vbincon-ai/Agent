version: '3.8'

services:
  superagent:
    build: .
    container_name: incon_superagent
    restart: always
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - DEEPSEEK_API_KEY=your_deepseek_api_key_here
    volumes:
      # Монтируем сетевую папку хранения сессий чатов, чтобы не терять историю при перезапусках
      - ./data:/app/data
